    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <filter id="a">
    <feTurbulence type="fractalNoise" baseFrequency="1" numOctaves="5" stitchTiles="stitch" result="noise"/>
    <feComponentTransfer in="noise" result="thresholded">
      <feFuncA type="discrete" tableValues="0 0 0 0 1 1 1 1"/>
    </feComponentTransfer>
    <feFlood flood-color="#2b0d4a" result="color"/>
    <feComposite in="color" in2="thresholded" operator="in"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#a)" opacity=".3"/>
</svg>
	<svg width="400" height="200">

  <defs>
    <filter id="noiseDisplace1">

      <feTurbulence
        type="turbulence"
        baseFrequency="0.02"
        numOctaves="2"
        result="noise"/>

      <feDisplacementMap
        in="SourceGraphic"
        in2="noise"
        scale="20"
        xChannelSelector="R"
        yChannelSelector="G"/>

    </filter>
  </defs>

  <text x="50" y="100"
        font-size="50"
        filter="url(#noiseDisplace1)">
    SVG
  </text>

</svg>
<svg width="400" height="200">

  <defs>

    <filter id="waterRipple">

      <feTurbulence
        type="fractalNoise"
        baseFrequency="0.01"
        numOctaves="3"
        result="noise"/>

      <feDisplacementMap
        in="SourceGraphic"
        in2="noise"
        scale="40"/>

    </filter>

  </defs>

  <rect
    x="50"
    y="50"
    width="300"
    height="100"
    fill="lightblue"
    filter="url(#waterRipple)"/>

</svg>
<svg width="400" height="200">

  <defs>

    <filter id="glitchNoise">

      <feTurbulence
        type="turbulence"
        baseFrequency="0.1"
        numOctaves="1"
        result="noise"/>

      <feDisplacementMap
        in="SourceGraphic"
        in2="noise"
        scale="60"/>

    </filter>

  </defs>

  <image
    href="https://picsum.photos/300/150"
    x="50"
    y="25"
    width="300"
    height="150"
    filter="url(#glitchNoise)"/>

</svg>
<svg width="400" height="200">

<defs>

<filter id="animatedNoise">

<feTurbulence
    type="fractalNoise"
    baseFrequency="0.01"
    numOctaves="2"
    seed="2"
    result="noise">

	<!-- attributeName="ceed"
	values="1;2" -->
    <animate
	attributeName="baseFrequency"
	values="0.01;0.02"
        dur="10s"
        repeatCount="indefinite"/>

</feTurbulence>

<feDisplacementMap
    in="SourceGraphic"
    in2="noise"
    scale="8"/>

</filter>

</defs>

<text x="50" y="100"
      font-size="50"
      filter="url(#animatedNoise)">
Animated
</text>

</svg>
