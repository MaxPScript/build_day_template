<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:wght@400;700&family=Oswald:wght@200..700&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/typography.css" />
    <link rel="stylesheet" href="./css/dev.css" />
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/footer.css" />
  </head>
  <body>
    <svg width="0" height="0" style="position: absolute">
      <defs>
        <filter id="animatedNoise">
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.01"
            numOctaves="2"
            seed="2"
            result="noise"
          >
            <!-- attributeName="ceed"
	values="1;2" -->
            <animate
              attributeName="baseFrequency"
              values="0.01;0.02"
              dur="10s"
              repeatCount="indefinite"
            />
          </feTurbulence>

          <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" />
        </filter>
      </defs>

      <!-- <text x="50" y="100" font-size="50" filter="url(#animatedNoise)">
        Animated
      </text> -->
    </svg>
    <div class="app">
      <header class="header">
        <p class="header_slogan">
          <span> Быстрее! </span>
          <span> Выше! </span>
          <span> Сильнее! </span>
        </p>
        <h1>День строителя в Сычёво</h1>
        <marquee
          class="header_marquee"
          behavior=""
          direction=""
          scrollamount="3"
        >
          При поддержке администрации Волоколамского района
        </marquee>
        <h2>
          <span class="header_span_day" id="header_span_day_id">День</span>
          <span class="header_span_date" id="header_span_date_id">Число</span>
          <span class="header_span_month" id="header_span_month_id">Месяц</span>
          <span class="header_span_year" id="header_span_year_id">Год</span>
        </h2>
        <p>
          <span class="header_span_info" id="header_span_info_id">
            дополнительная информация
          </span>
        </p>
        <nav class="header_nav">
          <ul class="header_nav_ul">
            <li><a href="#home">Стартовая стр.</a></li>
            <li><a href="#results">Результаты</a></li>
            <li><a href="#gallery">Галерея</a></li>
            <li class="header_select_container">
              <label for="header_select_id">Год</label>
              <select class="header_select" id="header_select_id">
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
              </select>
            </li>
          </ul>
        </nav>
      </header>
      <main class="main">
        <!-- <p id="test_1">test 1</p>
        <p id="test_2">test 2</p>
        <p id="test_3">test 3</p> -->
        <section class="hero" id="home">
          <img
            class="main_hero_image"
            src="./assets/images/hero.webp"
            alt="hero image"
            srcset=""
          />
        </section>
        <section class="results hidden" id="results_2024"></section>
        <section class="results hidden" id="results_2025"></section>
        <section class="results hidden" id="results_2026"></section>
        <section class="gallery hidden" id="gallery">
          <p>Gallery coming soon...</p>
        </section>
      </main>
      <footer class="footer">
        <span class="copyright"> 2026 © WebDev </span>
        <a href="#" class="footer_alink">
          <img src="./assets/icons/wa.svg" alt="whatsapp icon" />
        </a>
        <span>+7(926)604-66-41</span>
      </footer>
    </div>
  </body>
  <script type="module" src="./js/app.js"></script>
</html>
